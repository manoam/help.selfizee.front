services:
  web:
    build:
      context: .
      dockerfile: docker/node.Dockerfile
    container_name: help-selfizee-front-web
    working_dir: /app
    command: pnpm dev
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://host.docker.internal:3001}
      VITE_AUTH_DISABLED: ${VITE_AUTH_DISABLED:-false}
      VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL:-https://plateformdev-auth.orkessi.com}
      VITE_KEYCLOAK_REALM: ${VITE_KEYCLOAK_REALM:-konitys}
      VITE_KEYCLOAK_CLIENT_ID: ${VITE_KEYCLOAK_CLIENT_ID:-helpselfizee}
      NODE_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  node_modules:
